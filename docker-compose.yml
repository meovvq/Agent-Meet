# Agent Meet 部署配置
#
# 本地开发：启动独立的 PostgreSQL/Redis 容器
#   docker compose -f docker-compose.dev.yml up -d
#   uvicorn app.main:app --reload
#
# 全容器部署：docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-meet-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: agent_meet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: agent-meet-redis
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-meet-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:123456@postgres:5432/agent_meet
      REDIS_URL: redis://redis:6379/0
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v3}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      AGENT_MODE_ENABLED: ${AGENT_MODE_ENABLED:-true}
      AGENT_MAX_REASONING_STEPS: ${AGENT_MAX_REASONING_STEPS:-3}
      AGENT_MEMORY_ENABLED: ${AGENT_MEMORY_ENABLED:-true}
      AGENT_PLANNING_ENABLED: ${AGENT_PLANNING_ENABLED:-true}
      INTERVIEW_FOLLOW_UP_MAX: ${INTERVIEW_FOLLOW_UP_MAX:-2}
      INTERVIEW_HINT_ENABLED: ${INTERVIEW_HINT_ENABLED:-true}
      INTERVIEW_PASS_SCORE: ${INTERVIEW_PASS_SCORE:-7}
      INTERVIEW_FOLLOW_UP_SCORE: ${INTERVIEW_FOLLOW_UP_SCORE:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
