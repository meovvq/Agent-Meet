# Agent Meet 本地开发依赖服务
#
# 启动：docker compose -f docker-compose.dev.yml up -d
# 停止：docker compose -f docker-compose.dev.yml down
# 清除数据：docker compose -f docker-compose.dev.yml down -v

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-meet-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: agent_meet
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: agent-meet-redis
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
