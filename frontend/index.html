<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Agent Meet - AI Mock Interview</title>
  <script src="https://cdn.tailwindcss.cn"></script>
  <script>if(typeof tailwindcss==='undefined'){document.write('<script src="https://cdn.tailwindcss.com"><\/script>')}</script>
  <script>
    if(typeof tailwindcss!=='undefined'){tailwindcss.config={
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
          },
          fontFamily: {
            display: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            sans: ['Inter', 'system-ui', '-apple-system', 'PingFang SC', 'sans-serif'],
          }
        }
      }
    }}
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, -apple-system, 'PingFang SC', sans-serif; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

    /* ---- Base interactive styles ---- */
    input, textarea, select { border-color: #334155; background: #1e293b; color: #e2e8f0; }
    input:focus, textarea:focus, select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); outline: none; }
    .base-btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; border-radius: 0.75rem; transition: all 0.2s ease; }
    .base-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
    .icon-sm { width: 16px; height: 16px; flex-shrink: 0; }
    .icon-md { width: 20px; height: 20px; flex-shrink: 0; }
    .icon-lg { width: 24px; height: 24px; flex-shrink: 0; }

    /* ---- Glass card ---- */
    .glass-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
    }
    .glass-card-lg {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
    }

    /* ---- Fade-in animation ---- */
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ---- Chat bubbles ---- */
    .chat-bubble-user {
      background: #1e40af;
      color: white; border-radius: 18px 18px 4px 18px;
    }
    .chat-bubble-assistant {
      background: #1e293b;
      color: #e2e8f0; border-radius: 18px 18px 18px 4px;
      border: 1px solid #334155;
    }

    /* ---- Score ring ---- */
    .score-ring { transition: stroke-dashoffset 1s ease-in-out; }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* ---- Markdown body ---- */
    .markdown-body h1,.markdown-body h2,.markdown-body h3 { font-weight: 600; margin-top: 1em; margin-bottom: 0.5em; }
    .markdown-body h1 { font-size: 1.5em; } .markdown-body h2 { font-size: 1.25em; } .markdown-body h3 { font-size: 1.1em; }
    .markdown-body p { margin: 0.5em 0; line-height: 1.7; }
    .markdown-body ul,.markdown-body ol { padding-left: 1.5em; margin: 0.5em 0; }
    .markdown-body li { margin: 0.25em 0; }
    .markdown-body code { background: #334155; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; }
    .markdown-body pre { background: #0f172a; padding: 1em; border-radius: 8px; overflow-x: auto; margin: 0.5em 0; }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
    .markdown-body th,.markdown-body td { border: 1px solid #334155; padding: 0.5em 0.75em; text-align: left; }
    .markdown-body th { background: #1e293b; font-weight: 600; }
    .markdown-body blockquote { border-left: 3px solid #3b82f6; padding-left: 1em; color: #94a3b8; margin: 0.5em 0; }

    /* ---- Typing cursor ---- */
    .typing-cursor::after { content: '\25CA'; animation: blink 0.8s infinite; color: #3b82f6; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* ---- Agent reasoning ---- */
    .agent-thought { border-left: 3px solid #8b5cf6; background: rgba(139,92,246,0.06); }

    /* ---- Sidebar nav ---- */
    .nav-item {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 0.875rem;
      border-radius: 0.75rem; transition: all 0.2s ease; cursor: pointer;
      color: #94a3b8; font-size: 0.875rem; position: relative;
    }
    .nav-item:hover { color: #e2e8f0; background: rgba(255, 255, 255, 0.05); }
    .nav-item.active {
      color: #3b82f6; background: rgba(59, 130, 246, 0.1);
    }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 60%; background: #3b82f6; border-radius: 0 4px 4px 0;
    }
    .nav-icon-box {
      width: 2.25rem; height: 2.25rem; border-radius: 0.625rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .nav-item.active .nav-icon-box { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    .nav-item:not(.active) .nav-icon-box { background: rgba(255, 255, 255, 0.05); color: #94a3b8; }

    /* ---- Interview layout ---- */
    .interview-layout { display: grid; grid-template-columns: minmax(0,1fr) 400px; min-height: 0; height: 100%; }
    @media (max-width: 1024px) { .interview-layout { grid-template-columns: 1fr; } .interview-layout .sidebar-panel { max-height: 40vh; } }

    /* ---- Button primary ---- */
    .btn-primary {
      background: #2563eb;
      color: white; font-weight: 500; border-radius: 0.75rem;
      transition: all 0.2s ease;
    }
    .btn-primary:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: scale(0.98) translateY(0); }

    .btn-secondary {
      background: #334155; color: #e2e8f0;
      border: 1px solid #475569; border-radius: 0.75rem;
      transition: all 0.2s ease;
    }
    .btn-secondary:hover { background: #475569; border-color: #64748b; }

    /* ---- Spin animation ---- */
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }

    /* ---- Selection card ---- */
    .selection-card {
      border: 1px solid #334155; border-radius: 0.75rem;
      padding: 0.75rem 1rem; cursor: pointer; transition: all 0.2s ease;
      background: #1e293b;
    }
    .selection-card:hover { border-color: #475569; background: rgba(59, 130, 246, 0.06); }
    .selection-card.selected {
      border-color: #3b82f6; background: rgba(59, 130, 246, 0.1);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.15);
    }

    /* ---- Status badge ---- */
    .status-badge {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.75rem;
    }

    /* ---- Input ---- */
    .input-field {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 0.75rem; padding: 0.625rem 0.875rem; font-size: 0.875rem;
      color: #e2e8f0; transition: all 0.2s ease; width: 100%;
    }
    .input-field:focus {
      border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
      outline: none;
    }
    .input-field::placeholder { color: #64748b; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 shrink-0 flex flex-col bg-gray-900 border-r border-gray-800 h-full">
    <!-- Logo -->
    <div class="px-5 py-5 border-b border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-primary-600 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/><path d="M9 21h6"/></svg>
        </div>
        <div>
          <h1 class="text-sm font-semibold text-white tracking-tight">Agent Meet</h1>
          <p class="text-xs text-gray-500">AI Interview Assistant</p>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto" id="sidebar-nav">
      <div class="px-2 mb-2">
        <span class="text-[11px] font-medium text-gray-600 uppercase tracking-wider">Interview</span>
      </div>
      <button onclick="App.switchTab('interview')" data-tab="interview" class="nav-item active w-full">
        <div class="nav-icon-box">
          <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
        <div class="text-left">
          <div class="text-sm font-medium">Mock Interview</div>
          <div class="text-[11px] text-gray-500">AI-driven practice</div>
        </div>
      </button>

      <div class="px-2 mb-2 mt-5">
        <span class="text-[11px] font-medium text-gray-600 uppercase tracking-wider">Management</span>
      </div>
      <button onclick="App.switchTab('resume')" data-tab="resume" class="nav-item w-full">
        <div class="nav-icon-box">
          <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div class="text-left">
          <div class="text-sm font-medium">Resume</div>
          <div class="text-[11px] text-gray-500">Upload & analyze</div>
        </div>
      </button>
      <button onclick="App.switchTab('kb')" data-tab="kb" class="nav-item w-full">
        <div class="nav-icon-box">
          <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <div class="text-left">
          <div class="text-sm font-medium">Knowledge Base</div>
          <div class="text-[11px] text-gray-500">RAG document search</div>
        </div>
      </button>
      <button onclick="App.switchTab('sessions')" data-tab="sessions" class="nav-item w-full">
        <div class="nav-icon-box">
          <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </div>
        <div class="text-left">
          <div class="text-sm font-medium">Sessions</div>
          <div class="text-[11px] text-gray-500">View history</div>
        </div>
      </button>
    </nav>

    <!-- Footer -->
    <div class="px-5 py-4 border-t border-gray-800">
      <div class="flex items-center gap-3">
        <div id="status-indicator" class="flex items-center gap-2"></div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main id="app" class="flex-1 overflow-y-auto p-8">
    <div class="flex flex-col items-center justify-center h-full text-gray-500 gap-3">
      <div class="w-8 h-8 border-2 border-gray-700 border-t-primary-500 rounded-full animate-spin"></div>
      <span class="text-sm">Loading...</span>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="fixed top-6 right-6 z-50 hidden">
    <div class="bg-gray-800 border border-gray-700 text-sm px-4 py-3 rounded-lg shadow-xl max-w-sm"></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
